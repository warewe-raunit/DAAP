version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  daap:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    ports:
      - "8000:8000"
    volumes:
      - daap_data:/root/.daap

volumes:
  qdrant_data:
  daap_data:
